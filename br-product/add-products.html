<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product - UbuntuTrade</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../cart/popup-cart.css">
    <link rel="stylesheet" href="add-products.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/components.js"></script>
</head>
<body class="dashboard-page product-detail-page">
    <div id="navbarContainer"></div>

    <div class="dashboard-wrapper">
        <div id="sidebarContainer"></div>

        <main class="main-content">
            <section class="dashboard-content product-detail-content">
                <nav class="breadcrumb" aria-label="Breadcrumb">
                    <a href="../dashboard/market.html">Dashboard</a>
                    <i class="fas fa-chevron-right"></i>
                    <a href="../dashboard/my-products.html">My Products</a>
                    <i class="fas fa-chevron-right"></i>
                    <span>Add New Product</span>
                </nav>

                <header class="product-detail-header">
                    <h1>Add New Product</h1>
                    <p>Fill in the details below to list your product.</p>
                </header>

                <div class="product-detail-layout">
                    <form class="product-form-card" id="addProductForm">
                        <div class="form-grid">
                            <label class="form-field">
                                <span>Product Title <strong>*</strong></span>
                                <input type="text" id="productName" placeholder="e.g. Nike Air Force 1 '07" required>
                            </label>

                            <label class="form-field">
                                <span>Category <strong>*</strong></span>
                                <select id="productCategory" required>
                                    <option value="">Select a category</option>
                                    <option value="Shoes">Shoes</option>
                                    <option value="Electronics">Electronics</option>
                                    <option value="Clothing">Clothing</option>
                                    <option value="Home & Living">Home &amp; Living</option>
                                    <option value="Accessories">Accessories</option>
                                    <option value="Sports">Sports</option>
                                    <option value="Jewelry">Jewelry</option>
                                </select>
                            </label>

                            <label class="form-field">
                                <span>Price (R) <strong>*</strong></span>
                                <input type="number" id="productPrice" placeholder="e.g. 650" min="0" required>
                            </label>

                            <label class="form-field">
                                <span>Condition <strong>*</strong></span>
                                <select id="productCondition" required>
                                    <option value="">Select condition</option>
                                    <option value="Brand New">Brand New</option>
                                    <option value="Like New">Like New</option>
                                    <option value="Good">Good</option>
                                    <option value="Used">Used</option>
                                </select>
                            </label>
                        </div>

                        <label class="form-field full-width">
                            <span>Description <strong>*</strong></span>
                            <textarea id="productDescription" maxlength="500" placeholder="Describe your product, its condition, size, color, brand, etc." required></textarea>
                            <small id="descCount">0 / 500</small>
                        </label>

                        <label class="form-field full-width">
                            <span>Location <strong>*</strong></span>
                            <div class="input-with-icon">
                                <i class="fas fa-location-dot"></i>
                                <input type="text" id="productLocation" value="Johannesburg, Gauteng" required>
                            </div>
                            <em>This helps buyers near you.</em>
                        </label>
                        <div id="addProductError" style="color:red;margin-bottom:8px;display:none;"></div>

                        <div class="form-field full-width">
                            <span>Product Images <strong>*</strong></span>
                            <div class="image-uploader">
                                <label class="upload-dropzone">
                                    <input type="file" accept="image/png,image/jpeg" multiple>
                                    <i class="fas fa-cloud-arrow-up"></i>
                                    <strong>Click to upload images</strong>
                                    <span>or drag and drop</span>
                                    <small>You can upload up to 5 images (JPG, PNG)</small>
                                </label>

                                <div class="uploaded-images">
                                    <button class="add-more-image" type="button">
                                        <i class="fas fa-plus"></i>
                                        <span>Add more</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button class="cancel-btn" type="button">Cancel</button>
                            <button class="publish-btn" type="submit">Publish Product</button>
                        </div>
                    </form>

                    <aside class="preview-panel" aria-label="Product preview">
                        <h2>Preview</h2>
                        <p>This is how your product will appear.</p>

                        <article class="preview-card">
                            <div style="width:100%;height:160px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;border-radius:10px 10px 0 0;">
                                <i class="fas fa-image" style="font-size:48px;color:#ccc;"></i>
                            </div>
                            <div class="preview-body">
                                <h3 id="previewName">Your product title</h3>
                                <strong class="preview-price" id="previewPrice">R0</strong>
                                <span class="preview-location">
                                    <i class="fas fa-location-dot"></i>
                                    <span id="previewLocation">Your location</span>
                                </span>
                                <span class="condition-badge" id="previewCondition">Condition</span>
                            </div>
                        </article>
                    </aside>
                </div>
            </section>
        </main>
    </div>

    <script>
        UTComponents.init({ type: 'customer', activePage: 'my-products' });
        const user = UTComponents.getUser();

        // Live preview
        function updatePreview() {
            const name = document.getElementById('productName').value || 'Your product title';
            const price = document.getElementById('productPrice').value || '0';
            const location = document.getElementById('productLocation').value || 'Your location';
            const condition = document.getElementById('productCondition').value || 'Condition';
            document.getElementById('previewName').textContent = name;
            document.getElementById('previewPrice').textContent = 'R' + Number(price).toLocaleString();
            document.getElementById('previewLocation').textContent = location;
            document.getElementById('previewCondition').textContent = condition;
        }
        ['productName','productPrice','productLocation','productCondition'].forEach(id => {
            document.getElementById(id).addEventListener('input', updatePreview);
            document.getElementById(id).addEventListener('change', updatePreview);
        });

        // Description char count
        document.getElementById('productDescription').addEventListener('input', function() {
            document.getElementById('descCount').textContent = this.value.length + ' / 500';
        });

        // Form submit
        document.getElementById('addProductForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errEl = document.getElementById('addProductError');
            errEl.style.display = 'none';
            if (!user) { errEl.textContent = 'Please log in to add products.'; errEl.style.display = 'block'; return; }
            const name = document.getElementById('productName').value.trim();
            const category = document.getElementById('productCategory').value;
            const price = document.getElementById('productPrice').value;
            const condition = document.getElementById('productCondition').value;
            const description = document.getElementById('productDescription').value.trim();
            const location = document.getElementById('productLocation').value.trim();
            if (!name || !category || !price || !condition) { errEl.textContent = 'Please fill in all required fields.'; errEl.style.display = 'block'; return; }
            const publishBtn = document.querySelector('.publish-btn');
            publishBtn.disabled = true; publishBtn.textContent = 'Publishing...';
            try {
                const res = await fetch('/api/products/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, category, price: parseFloat(price), condition, description, location, userId: user.id })
                });
                const data = await res.json();
                if (!res.ok) { errEl.textContent = data.message || 'Failed to publish product.'; errEl.style.display = 'block'; publishBtn.disabled = false; publishBtn.textContent = 'Publish Product'; return; }
                window.location.href = '../dashboard/my-products.html';
            } catch (err) { errEl.textContent = 'Network error. Please try again.'; errEl.style.display = 'block'; publishBtn.disabled = false; publishBtn.textContent = 'Publish Product'; }
        });

        document.querySelector('.cancel-btn').addEventListener('click', function() { window.location.href = '../dashboard/my-products.html'; });
    </script>
</body>
</html>
