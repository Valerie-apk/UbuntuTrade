<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Products - UbuntuTrade</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../cart/popup-cart.css">
    <link rel="stylesheet" href="browse-products.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/components.js"></script>
</head>
<body class="dashboard-page">
    <div id="navbarContainer"></div>

    <!-- Dashboard Wrapper -->
    <div class="dashboard-wrapper">
        <!-- SIDEBAR -->
        <div id="sidebarContainer"></div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- CONTENT -->
            <div class="dashboard-content browse-products-page">
                <!-- PAGE HEADER -->
                <div class="browse-header">
                    <div class="browse-title-section">
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
                            <button onclick="history.length > 1 ? history.back() : window.location.href='/dashboard/market.html'"
                                style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#f5f5f5;border:none;border-radius:8px;cursor:pointer;font-size:13px;color:#555;font-family:inherit;transition:background .15s;"
                                onmouseover="this.style.background='#ebebeb'" onmouseout="this.style.background='#f5f5f5'">
                                <i class="fas fa-arrow-left"></i> Back
                            </button>
                            <h1 style="margin:0;">All Products</h1>
                        </div>
                        <p class="results-info">Showing 1 - 12 of 120 results</p>
                    </div>
                    <div class="sort-filter-section">
                        <div class="sort-section">
                            <label for="sort">Sort by:</label>
                            <select id="sort" class="sort-dropdown">
                                <option value="newest">Newest First</option>
                                <option value="price-low">Price: Low to High</option>
                                <option value="price-high">Price: High to Low</option>
                                <option value="popular">Most Popular</option>
                            </select>
                        </div>
                        <button class="filter-btn" id="filterBtn">
                            <span>Filter</span>
                            <i class="fas fa-sliders-h"></i>
                        </button>
                    </div>
                </div>

                <!-- FILTER MODAL -->
                <div class="filter-modal" id="filterModal">
                    <div class="filter-modal-content">
                        <div class="filter-header">
                            <h2>Filter Products</h2>
                            <button class="filter-close-btn" id="closeFilterBtn">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>

                        <div class="filter-body">
                            <!-- CATEGORY FILTER -->
                            <div class="filter-group">
                                <h3>Category</h3>
                                <div class="filter-options">
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="category" value="electronics">
                                        <span>Electronics</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="category" value="clothing">
                                        <span>Clothing & Fashion</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="category" value="home">
                                        <span>Home & Living</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="category" value="accessories">
                                        <span>Accessories</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="category" value="sports">
                                        <span>Sports & Outdoors</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="category" value="jewelry">
                                        <span>Jewelry</span>
                                    </label>
                                </div>
                            </div>

                            <!-- PRICE FILTER -->
                            <div class="filter-group">
                                <h3>Price Range</h3>
                                <div class="price-inputs">
                                    <input type="number" id="priceMin" class="price-input" placeholder="Min" min="0">
                                    <span class="price-separator">-</span>
                                    <input type="number" id="priceMax" class="price-input" placeholder="Max" min="0">
                                </div>
                                <div class="price-range-slider">
                                    <input type="range" id="priceMinSlider" class="range-input" min="0" max="10000" value="0">
                                    <input type="range" id="priceMaxSlider" class="range-input" min="0" max="10000" value="10000">
                                    <div class="range-track"></div>
                                    <div class="range-fill"></div>
                                </div>
                                <div class="price-display">
                                    R<span id="minDisplay">0</span> - R<span id="maxDisplay">10000</span>
                                </div>
                            </div>

                            <!-- LOCATION FILTER -->
                            <div class="filter-group">
                                <h3>Location</h3>
                                <div class="filter-options">
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="location" value="johannesburg">
                                        <span>Johannesburg</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="location" value="cape-town">
                                        <span>Cape Town</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="location" value="durban">
                                        <span>Durban</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="location" value="pretoria">
                                        <span>Pretoria</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="location" value="bloemfontein">
                                        <span>Bloemfontein</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="location" value="port-elizabeth">
                                        <span>Port Elizabeth</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="location" value="east-london">
                                        <span>East London</span>
                                    </label>
                                </div>
                            </div>

                            <!-- DEPARTMENT FILTER -->
                            <div class="filter-group">
                                <h3>Department</h3>
                                <div class="filter-options">
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="department" value="mens">
                                        <span>Men's</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="department" value="womens">
                                        <span>Women's</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="department" value="kids">
                                        <span>Kids</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="department" value="unisex">
                                        <span>Unisex</span>
                                    </label>
                                    <label class="filter-checkbox">
                                        <input type="checkbox" name="department" value="home-general">
                                        <span>Home & General</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="filter-footer">
                            <button class="filter-clear-btn" id="clearFilterBtn">Clear All</button>
                            <button class="filter-apply-btn" id="applyFilterBtn">Apply Filters</button>
                        </div>
                    </div>
                </div>

                <!-- PRODUCTS GRID -->
                <div class="products-grid" id="productsGrid">
                    <p style="color:#999;padding:20px;">Loading products...</p>
                </div>

                <!-- PAGINATION -->
                <div class="pagination" id="paginationContainer" style="display:none;">
                    <button class="pagination-btn prev-btn" id="prevBtn" title="Previous">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div id="pageButtons"></div>
                    <button class="pagination-btn next-btn" id="nextBtn" title="Next">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div>
            <h3>About UbuntuTrade</h3>
            <p>Connecting local buyers &amp; sellers</p>
        </div>
        <div>
            <h3>Contact</h3>
            <p>info@Ubuntutrade.co.za<br><a href="/contact-support">Contact Support</a></p>
        </div>
        <div>
            <h3>Legal</h3>
            <a href="/privacy-policy">View Privacy Policy</a>
            <a href="/faqs">FAQs</a>
        </div>
    </footer>

    <script>
        UTComponents.init({ type: 'customer', activePage: 'browse' });
        const user = UTComponents.getUser();

        // Read URL params (from landing page search / category buttons)
        const _urlParams   = new URLSearchParams(window.location.search);
        const _initSearch  = _urlParams.get('search')   || '';
        const _initCategory = _urlParams.get('category') || '';

        // Pre-fill navbar search bar with URL search term
        if (_initSearch) {
            const sb = document.querySelector('.search-bar input');
            if (sb) sb.value = _initSearch;
        }

        // Update page heading
        const _h1 = document.querySelector('.browse-title-section h1');
        if (_initSearch)   _h1.textContent = 'Results for "' + _initSearch + '"';
        if (_initCategory) _h1.textContent = _initCategory;

        // Product grid
        const grid = document.getElementById('productsGrid');
        const resultsInfo = document.querySelector('.results-info');
        let currentPage = 1;
        const pageSize = 12;
        let allProducts = [];

        function buildProductCard(p) {
            const img = p.imageUrl && p.imageUrl !== 'default-product.png'
                ? `<img src="${p.imageUrl}" alt="${p.name}" onerror="this.style.display='none'">`
                : `<div style="width:100%;height:160px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:48px;">📦</div>`;
            return `<div class="product-card" data-id="${p.id}">
                <div class="product-card-image">
                    ${img}
                </div>
                <div class="product-card-info">
                    <h3>${p.name}</h3>
                    <p class="product-price">R${Number(p.price).toLocaleString()}</p>
                    <p class="product-location"><i class="fas fa-map-marker-alt"></i> ${p.location || 'SA'}</p>
                    <button class="view-product-btn" onclick="window.location.href='product-detail.html?id=${p.id}'">View Product</button>
                </div>
            </div>`;
        }

        function renderPage() {
            const start = (currentPage - 1) * pageSize;
            const page = allProducts.slice(start, start + pageSize);
            grid.innerHTML = page.length ? page.map(buildProductCard).join('') : '<p style="color:#999;padding:20px;">No products found.</p>';
            resultsInfo.textContent = `Showing ${start + 1} - ${Math.min(start + page.length, allProducts.length)} of ${allProducts.length} results`;
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(allProducts.length / pageSize);
            const container = document.getElementById('paginationContainer');
            const pageButtons = document.getElementById('pageButtons');
            if (totalPages <= 1) { container.style.display = 'none'; return; }
            container.style.display = 'flex';
            let btns = '';
            for (let i = 1; i <= totalPages; i++) {
                btns += `<button class="pagination-btn${i === currentPage ? ' active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            pageButtons.innerHTML = btns;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }

        window.goToPage = function(p) { currentPage = p; renderPage(); window.scrollTo(0,0); };
        document.getElementById('prevBtn').addEventListener('click', function() { if (currentPage > 1) { currentPage--; renderPage(); } });
        document.getElementById('nextBtn').addEventListener('click', function() {
            if (currentPage < Math.ceil(allProducts.length / pageSize)) { currentPage++; renderPage(); }
        });

        async function loadProducts(params = {}) {
            const qs = new URLSearchParams(params).toString();
            grid.innerHTML = '<p style="color:#999;padding:20px;">Loading...</p>';
            try {
                const res = await fetch('/api/products' + (qs ? '?' + qs : ''));
                const products = await res.json();
                allProducts = user && user.role === 'Seller'
                    ? products.filter(p => Number(p.userId) !== Number(user.id))
                    : products;
                currentPage = 1;
                renderPage();
            } catch (e) {
                grid.innerHTML = '<p style="color:red;padding:20px;">Failed to load products.</p>';
            }
        }

        // Initial load — honour URL params
        const _initParams = { sort: 'newest' };
        if (_initSearch)   _initParams.search   = _initSearch;
        if (_initCategory) _initParams.category  = _initCategory;
        loadProducts(_initParams);

        // Sort
        document.getElementById('sort').addEventListener('change', function() {
            loadProducts(buildFilterParams());
        });

        function buildFilterParams() {
            const params = { sort: document.getElementById('sort').value };
            const cats = Array.from(document.querySelectorAll('input[name="category"]:checked')).map(c => c.value);
            const locs = Array.from(document.querySelectorAll('input[name="location"]:checked')).map(c => c.value);
            const minP = document.getElementById('priceMin').value;
            const maxP = document.getElementById('priceMax').value;
            if (cats.length) params.category = cats[0];
            if (locs.length) params.location = locs[0];
            if (minP) params.minPrice = minP;
            if (maxP) params.maxPrice = maxP;
            const search = document.querySelector('.search-bar input').value.trim();
            if (search) params.search = search;
            return params;
        }

        // Search
        document.querySelector('.search-bar input').addEventListener('input', function() {
            clearTimeout(this._t);
            this._t = setTimeout(() => loadProducts(buildFilterParams()), 400);
        });

        // Filter modal
        document.getElementById('filterBtn').addEventListener('click', function() {
            document.getElementById('filterModal').classList.add('active');
        });
        document.getElementById('closeFilterBtn').addEventListener('click', function() {
            document.getElementById('filterModal').classList.remove('active');
        });
        document.getElementById('filterModal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
        });

        // Price sliders
        const priceMinSlider = document.getElementById('priceMinSlider');
        const priceMaxSlider = document.getElementById('priceMaxSlider');
        const priceMinInput  = document.getElementById('priceMin');
        const priceMaxInput  = document.getElementById('priceMax');
        function syncPriceDisplay() {
            let min = parseInt(priceMinSlider.value), max = parseInt(priceMaxSlider.value);
            if (min > max) { priceMinSlider.value = max; min = max; }
            document.getElementById('minDisplay').textContent = min.toLocaleString();
            document.getElementById('maxDisplay').textContent = max.toLocaleString();
            priceMinInput.value = min; priceMaxInput.value = max;
        }
        priceMinSlider.addEventListener('input', syncPriceDisplay);
        priceMaxSlider.addEventListener('input', syncPriceDisplay);
        priceMinInput.addEventListener('input', function() { priceMinSlider.value = this.value; syncPriceDisplay(); });
        priceMaxInput.addEventListener('input', function() { priceMaxSlider.value = this.value; syncPriceDisplay(); });

        document.getElementById('applyFilterBtn').addEventListener('click', function() {
            document.getElementById('filterModal').classList.remove('active');
            loadProducts(buildFilterParams());
        });
        document.getElementById('clearFilterBtn').addEventListener('click', function() {
            document.querySelectorAll('.filter-checkbox input').forEach(cb => cb.checked = false);
            priceMinSlider.value = 0; priceMaxSlider.value = 10000; syncPriceDisplay();
        });

    </script>
</body>
</html>
