<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - UbuntuTrade</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../cart/popup-cart.css">
    <link rel="stylesheet" href="messages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/components.js"></script>
</head>
<body class="dashboard-page">
    <div id="navbarContainer"></div>

    <!-- Dashboard Wrapper -->
    <div class="dashboard-wrapper">
        <!-- SIDEBAR -->
        <div id="sidebarContainer"></div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- MESSAGES CONTAINER -->
            <div class="messages-container">
                <!-- CONVERSATIONS LIST -->
                <div class="conversations-panel">
                    <div class="conversations-header">
                        <h2>Messages</h2>
                        <p class="conversations-subtitle">Communicate with buyers and sellers.</p>
                    </div>

                    <div class="conversations-search">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchConversations" placeholder="Search conversations...">
                        <button class="filter-conversations-btn" title="Filter">
                            <i class="fas fa-sliders-h"></i>
                        </button>
                    </div>

                    <div class="conversations-list" id="conversationsList">
                        <p style="color:#999;padding:16px;">Loading conversations...</p>
                    </div>
                </div>

                <!-- CHAT PANEL -->
                <div class="chat-panel">
                    <div class="chat-header" id="chatHeader" style="display:none;">
                        <div class="chat-header-info">
                            <div class="chat-avatar" id="chatAvatar" style="width:40px;height:40px;border-radius:50%;background:#e07b39;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:16px;">?</div>
                            <div class="chat-user-info">
                                <h2 id="chatUsername">-</h2>
                                <p class="chat-product-info" id="chatProductInfo"></p>
                            </div>
                        </div>
                        <button class="chat-menu-btn" title="More options"><i class="fas fa-ellipsis-v"></i></button>
                    </div>

                    <div class="chat-messages" id="chatMessages">
                        <p style="padding:40px;color:#999;text-align:center;">Select a conversation to start chatting.</p>
                    </div>

                    <!-- MESSAGE INPUT -->
                    <div class="chat-input-area" id="chatInputArea" style="display:none;">
                        <button class="attachment-btn" title="Attach file"><i class="fas fa-paperclip"></i></button>
                        <input type="text" class="message-input" id="messageInput" placeholder="Type your message...">
                        <button class="emoji-btn" title="Emoji"><i class="far fa-smile"></i></button>
                        <button class="send-btn" id="sendBtn">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div>
            <h3>About UbuntuTrade</h3>
            <p>Connecting local buyers &amp; sellers</p>
        </div>
        <div>
            <h3>Contact</h3>
            <p>info@Ubuntutrade.co.za</p>
        </div>
        <div>
            <h3>Legal</h3>
            <a href="/privacy-policy">View Privacy Policy</a>
            <a href="/faqs">FAQs</a>
        </div>
    </footer>

    <script>
        UTComponents.init({ type: 'customer', activePage: 'messages' });
        const user = UTComponents.getUser();

        let activeConvId = null;
        let allConversations = [];

        function timeStr(dateStr) {
            const d = new Date(dateStr);
            const now = new Date();
            const diffDays = Math.floor((now - d) / 86400000);
            if (diffDays === 0) return d.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });
            if (diffDays === 1) return 'Yesterday';
            if (diffDays < 7) return diffDays + ' days ago';
            return d.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short' });
        }

        function getOtherUser(conv) {
            if (!user) return null;
            return Number(conv.buyerId) === Number(user.id) ? conv.seller : conv.buyer;
        }

        function renderConversations(convs) {
            const list = document.getElementById('conversationsList');
            if (!convs || convs.length === 0) { list.innerHTML = '<p style="color:#999;padding:16px;">No conversations yet.</p>'; return; }
            list.innerHTML = convs.map(c => {
                const other = getOtherUser(c);
                const name = other ? (other.username || other.fullName || 'User') : 'User';
                const initials = name.substring(0, 2).toUpperCase();
                const unread = Number(c.buyerId) === Number(user.id) ? (c.unreadForBuyer || 0) : (c.unreadForSeller || 0);
                return `<div class="conversation-item${c.id === activeConvId ? ' active' : ''}" data-id="${c.id}">
                    <div class="conversation-avatar">
                        <div style="width:40px;height:40px;border-radius:50%;background:#e07b39;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;">${initials}</div>
                    </div>
                    <div class="conversation-info">
                        <h3>${name}</h3>
                        <p class="last-message">${c.lastMessage || 'No messages yet'}</p>
                    </div>
                    <div class="conversation-meta">
                        <span class="message-time">${c.updatedAt ? timeStr(c.updatedAt) : ''}</span>
                        ${unread > 0 ? `<span class="unread-badge">${unread}</span>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        async function loadConversations() {
            if (!user) { document.getElementById('conversationsList').innerHTML = '<p style="color:#999;padding:16px;">Please log in.</p>'; return; }
            try {
                const res = await fetch('/api/messages/conversations/' + user.id);
                allConversations = await res.json();
                renderConversations(allConversations);
            } catch (e) {
                document.getElementById('conversationsList').innerHTML = '<p style="color:red;padding:16px;">Failed to load.</p>';
            }
        }

        async function openConversation(convId) {
            activeConvId = convId;
            const conv = allConversations.find(c => c.id === convId);
            if (!conv) return;
            const other = getOtherUser(conv);
            const name = other ? (other.username || other.fullName) : 'User';
            const initials = name.substring(0, 2).toUpperCase();
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('chatAvatar').textContent = initials;
            document.getElementById('chatUsername').textContent = name;
            document.getElementById('chatProductInfo').textContent = conv.product ? 'About: ' + conv.product.name : '';
            document.getElementById('chatInputArea').style.display = 'flex';
            renderConversations(allConversations);

            // Mark read
            if (user) {
                await fetch('/api/messages/conversations/' + convId + '/read', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: user.id }) }).catch(() => {});
            }

            // Load messages
            try {
                const res = await fetch('/api/messages/conversations/' + convId + '/messages');
                const messages = await res.json();
                const chatDiv = document.getElementById('chatMessages');
                if (messages.length === 0) { chatDiv.innerHTML = '<p style="padding:20px;color:#999;text-align:center;">No messages yet. Say hello!</p>'; return; }
                chatDiv.innerHTML = messages.map(m => {
                    const isMe = Number(m.senderId) === Number(user.id);
                    const senderName = m.sender ? (m.sender.username || m.sender.fullName) : 'User';
                    const sInit = senderName.substring(0, 2).toUpperCase();
                    return `<div class="message ${isMe ? 'outgoing' : 'incoming'}">
                        ${!isMe ? `<div class="message-avatar" style="width:32px;height:32px;border-radius:50%;background:#e07b39;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:bold;flex-shrink:0;">${sInit}</div>` : ''}
                        <div class="message-content">
                            <p class="message-text">${m.body}</p>
                            <span class="message-time">${timeStr(m.createdAt)}</span>
                            ${isMe ? '<i class="fas fa-check-double read-receipt"></i>' : ''}
                        </div>
                    </div>`;
                }).join('');
                chatDiv.scrollTop = chatDiv.scrollHeight;
            } catch (e) { document.getElementById('chatMessages').innerHTML = '<p style="color:red;padding:20px;">Failed to load messages.</p>'; }
        }

        // Conversation click
        document.getElementById('conversationsList').addEventListener('click', function(e) {
            const item = e.target.closest('.conversation-item');
            if (item) openConversation(Number(item.dataset.id));
        });

        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const body = input.value.trim();
            if (!body || !activeConvId || !user) return;
            input.value = '';
            try {
                const res = await fetch('/api/messages/conversations/' + activeConvId + '/messages', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ senderId: user.id, body })
                });
                if (res.ok) {
                    await loadConversations();
                    await openConversation(activeConvId);
                }
            } catch (e) { console.error('Send error:', e); }
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        // Search conversations
        document.getElementById('searchConversations').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = allConversations.filter(c => {
                const other = getOtherUser(c);
                const name = other ? (other.username || other.fullName || '') : '';
                return name.toLowerCase().includes(term);
            });
            renderConversations(filtered);
        });

        loadConversations();
    </script>
</body>
</html>
