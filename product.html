<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Display</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background: #f9f9f9; }
        h1 { text-align: center; color: #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 16px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); background: white; }
        .card img { max-width: 100%; height: 160px; object-fit: cover; border-radius: 4px; background: #eee; }
        .card h3 { margin: 12px 0 6px 0; font-size: 1.1em; color: #222; }
        .card p { font-size: 0.9em; color: #666; margin: 0 0 12px 0; height: 36px; overflow: hidden; }
        .price { font-weight: bold; color: #2e7d32; font-size: 1.2em; margin: 0; }
    </style>
</head>
<body>

    <h1>Product Catalog</h1>
    <div id="catalog" class="grid">Loading products...</div>

    <script>
        const catalog = document.getElementById('catalog');

        fetch('http://localhost:3000/api/products')
            .then(res => {
                if (!res.ok) throw new Error('Server response error');
                return res.json();
            })
            .then(products => {
                catalog.innerHTML = ''; 

                if (products.length === 0) {
                    catalog.innerHTML = '<p>No products found.</p>';
                    return;
                }

                products.forEach(item => {
                    catalog.innerHTML += `

                        <div class="card">
                            <img src="${item.imageUrl}" alt="${item.name}">
                            <h3>${item.name}</h3>
                            <p>${item.description || 'No description available'}</p>
                            <p class="price">R ${Number(item.price).toFixed(2)}</p>
                        </div>
                    
                    
                        `;
                });
            })
            .catch(err => {
                console.error(err);
                catalog.innerHTML = `<p style="color: red; text-align: center;">Failed to connect to backend server.</p>`;
            });
    </script>
</body>
</html>
