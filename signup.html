<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | UbuntuTrade</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">Ubuntu <span class="color-logo">Trade</span></div>
    <a href="index.html" class="nav-close-btn" title="Back to Home">
        <i class="fas fa-times"></i>
    </a>
</nav>

<section class="signup-page">
    <div class="signup-card">
        <div class="brand-header">
            <h1>Create your account</h1>
            <p>Join UbuntuTrade and start buying or selling locally.</p>
        </div>

        <form>
            <label for="name">Full name</label>
            <input id="name" type="text" placeholder="Your full name" required>

            <label for="email">Email address</label>
            <input id="email" type="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter a password" required>

            <label for="confirm-password">Confirm password</label>
            <input id="confirm-password" type="password" placeholder="Repeat your password" required>

            <button type="submit" class="btn-primary">Sign Up</button>
        </form>

        <div class="form-footer">
            <p>Already have an account? <a href="login.html">Sign in</a></p>
        </div>
    </div>
</section>

</body>
</html>
