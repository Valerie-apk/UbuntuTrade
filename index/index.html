<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UbuntuTrade</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">Ubuntu <span class="color-logo">Trade</span></div>

    <div class="nav-buttons">
        <a class="btn-login" href="login.html">Login</a>
        <a class="btn-register" href="signup.html">Register</a>
    </div>
</nav>

<!-- HERO SECTION -->
<section class="landing-page">
    <img src="my-img.jpeg" alt="Marketplace" class="my-img">

    <div class="inside-img">
        <h2 class="landing-title">Buy & Sell in Your Community</h2>
        <p class="subtitle">Affordable, Local & Trusted Marketplace</p>

        <div class="input-section">
            <input type="text" placeholder="Search for products...">
            <button>Search</button>
        </div>
    </div>
    
</section>

<!-- CATEGORIES -->
<section class="categories">
    <div class="categories-inner">
        <button class="category-button clothing">Clothing</button>
        <button class="category-button electronics">Electronics</button>
        <button class="category-button home">Home & Living</button>
        <button class="category-button more">More ▾</button>
    </div>
</section>

<!-- FEATURED PRODUCTS -->
<section class="featured-products">

    <h2>Featured Products</h2>

    <div class="product-grid">

        <div class="product">
            <img src="phone.png" class="product-img">
            <h3>Smartphone</h3>
            <p class="price">R1500</p>
            <button>View Product</button>
        </div>

        <div class="product">
            <img src="trad-Dress.png" class="product-img">
            <h3>Traditional Dress</h3>
            <p class="price">R300</p>
            <button>View Product</button>
        </div>

        <div class="product">
            <img src="pots.png" class="product-img">
            <h3>Cooking Pot</h3>
            <p class="price">R750</p>
            <button>View Product</button>
        </div>

        <div class="product">
            <img src="sneaker.png" class="product-img">
            <h3>Sneakers</h3>
            <p class="price">R400</p>
            <button>View Product</button>
        </div>

    </div>
</section>

<!-- FOOTER -->
<section class="pre-footer">
    <img src="user-market.jpg" alt="Market">
</section>

<footer class="footer">
    <div>
        <h3>About UbuntuTrade</h3>
        <p>Connecting local buyers & sellers</p>
    </div>

    <div>
        <h3>Contact</h3>
        <p>info@Ubuntutrade.co.za</p>
    </div>
</footer>

</body>
</html>
