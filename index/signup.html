<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | UbuntuTrade</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">Ubuntu <span class="color-logo">Trade</span></div>
    <a href="index.html" class="nav-close-btn" title="Back to Home">
        <i class="fas fa-times"></i>
    </a>
</nav>

<section class="signup-page">
    <div class="signup-card">
        <div class="brand-header">
            <h1>Create your account</h1>
            <p>Join UbuntuTrade and start buying or selling locally.</p>
        </div>

        <form id="signup-form">
            <label for="name">Full name</label>
            <input id="name" type="text" placeholder="Your full name" required>

            <label for="email">Email address</label>
            <input id="email" type="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter a password" required>

            <label for="confirm-password">Confirm password</label>
            <input id="confirm-password" type="password" placeholder="Repeat your password" required>

            <div id="signupError" style="color: red; margin-bottom: 8px; display: none;"></div>

            <button type="submit" class="btn-primary">Sign Up</button>
        </form>
    

        <div class="form-footer">
            <p>Already have an account? <a href="login.html">Sign in</a></p>
            <p style="margin-top:10px;font-size:13px;color:#888;">
                By signing up you agree to our <a href="/privacy-policy">Privacy Policy</a>. <a href="/privacy-policy">View Privacy Policy</a>
            </p>
        </div>
    </div>
</section>
<script>
     //Access the form element
     document.getElementById('signup-form').addEventListener('submit', async function(event) {
        event.preventDefault(); // Prevent the default form submission

        // Get form values
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        const error = document.getElementById("signupError");  
        error.style.display = "none"; // Hide error message by default

        // Basic validation
        if (password !== confirmPassword) {
            error.style.display = "block"; // Show error message
            error.textContent = "Passwords do not match.";
            return;
        }


        try{
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({name, email, password })
            });

            const data = await res.json();
            if (!res.ok) {
                // Registration failed, show error message
                error.style.display = "block"; // Show error message
                error.textContent = data.message || "Registration failed.";
                return;
            }
            // Registration successful, redirect to login page
            window.location.href = 'login.html'; 
        } catch (err) {
            error.style.display = "block"; // Show error message
                error.textContent = "An error occurred. Please try again.";
            


        }
     } );

</script>
</body>
</html>
