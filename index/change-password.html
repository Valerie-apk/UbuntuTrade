<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Set New Password | UbuntuTrade</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<nav class="navbar">
    <div class="logo">Ubuntu <span class="color-logo">Trade</span></div>
</nav>
<section style="padding:40px;display:flex;justify-content:center;">
    <div style="max-width:420px;width:100%;background:#fff;padding:24px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.06);">
        <h2 style="margin:0 0 8px;">Set a new password</h2>
        <p style="color:#666;margin:0 0 16px;">Choose a permanent password for your account.</p>
        <form id="cpForm">
            <label>New password</label>
            <input id="newPassword" type="password" required placeholder="Enter new password" style="width:100%;padding:10px;margin:6px 0 12px;border:1px solid #ddd;border-radius:6px;">
            <label>Confirm password</label>
            <input id="confirmPassword" type="password" required placeholder="Confirm new password" style="width:100%;padding:10px;margin:6px 0 12px;border:1px solid #ddd;border-radius:6px;">
            <div id="cpErr" style="color:red;display:none;margin-bottom:8px;"></div>
            <button type="submit" class="btn-primary">Save Password</button>
        </form>
    </div>
</section>
<footer class="footer">
    <div>
        <h3>About UbuntuTrade</h3>
        <p>Connecting local buyers &amp; sellers</p>
    </div>
    <div>
        <h3>Contact</h3>
        <p>info@Ubuntutrade.co.za<br><a href="/contact-support">Contact Support</a></p>
    </div>
    <div>
        <h3>Legal</h3>
        <a href="/privacy-policy">View Privacy Policy</a>
        <a href="/faqs">FAQs</a>
    </div>
</footer>
<script>
document.getElementById('cpForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const err = document.getElementById('cpErr'); err.style.display='none';
    const p1 = document.getElementById('newPassword').value.trim();
    const p2 = document.getElementById('confirmPassword').value.trim();
    if (!p1 || p1.length < 6) { err.textContent='Password must be at least 6 characters.'; err.style.display='block'; return; }
    if (p1 !== p2) { err.textContent='Passwords do not match.'; err.style.display='block'; return; }
    const ut = JSON.parse(localStorage.getItem('utUser')||'null');
    if (!ut || !ut.id) { window.location.href='/index/login.html'; return; }
    try {
        const res = await fetch('/api/auth/set-password', {
            method: 'POST', headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({ userId: ut.id, newPassword: p1 })
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.message || 'Failed to set password'; err.style.display='block'; return; }
        // update local user and redirect
        ut.mustChangePassword = false;
        localStorage.setItem('utUser', JSON.stringify(ut));
        if (ut.role === 'Admin') window.location.href = '/admin/admin.html'; else window.location.href = '/dashboard/market.html';
    } catch (e) { err.textContent = 'Network error'; err.style.display='block'; }
});
</script>
</body>
</html>
