<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | UbuntuTrade</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">Ubuntu <span class="color-logo">Trade</span></div>
    <a href="index.html" class="nav-close-btn" title="Back to Home">
        <i class="fas fa-times"></i>
    </a>

    <!-- <div class="nav-buttons">
        <a class="btn-login" href="login.html">Login</a>
        <button class="btn-register">Register</button>
    </div> -->
</nav>

<section class="login-page">
    <div class="login-card">
        <div class="brand-header">
            <h1>Welcome Back</h1>
            <p>Sign in to manage your local marketplace account.</p>
        </div>

        <form id="loginForm">
            <label for="email">Email address</label>
            <input id="email" type="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter your password" required>

            <div id="loginError" style="color:red;margin-bottom:8px;display:none;"></div>

            <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <div class="form-footer">
            <p>Don't have an account? <a href="signup.html">Create one</a></p>
        </div>
    </div>
</section>

<footer class="footer">
    <div>
        <h3>About UbuntuTrade</h3>
        <p>Connecting local buyers &amp; sellers</p>
    </div>
    <div>
        <h3>Contact</h3>
        <p>info@Ubuntutrade.co.za</p>
    </div>
    <div>
        <h3>Legal</h3>
        <a href="/privacy-policy">View Privacy Policy</a>
        <a href="/faqs">FAQs</a>
    </div>
</footer>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errEl = document.getElementById('loginError');
        errEl.style.display = 'none';
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (!res.ok) {
                errEl.textContent = data.message || 'Login failed';
                errEl.style.display = 'block';
                return;
            }
            localStorage.setItem('utUser', JSON.stringify(data.user));
            window.location.href = data.user.role === 'Admin'
                ? '/admin/admin.html'
                : '../dashboard/market.html';
        } catch (err) {
            errEl.textContent = 'Network error. Please try again.';
            errEl.style.display = 'block';
        }
    });
</script>
</body>
</html>
