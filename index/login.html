<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | UbuntuTrade</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">Ubuntu <span class="color-logo">Trade</span></div>
    <a href="index.html" class="nav-close-btn" title="Back to Home">
        <i class="fas fa-times"></i>
    </a>

    <!-- <div class="nav-buttons">
        <a class="btn-login" href="login.html">Login</a>
        <button class="btn-register">Register</button>
    </div> -->
</nav>

<section class="login-page">
    <div class="login-card">
        <div class="brand-header">
            <h1>Welcome Back</h1>
            <p>Sign in to manage your local marketplace account.</p>
        </div>

        <form>
            <label for="email">Email address</label>
            <input id="email" type="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter your password" required>

            <button type="submit" class="btn-primary"  href="market.html">Sign In </button>
        </form>

        <div class="form-footer">
            <p>Don't have an account? <a href="signup.html">Create one</a></p>
        </div>
    </div>
</section>

</body>
</html>
