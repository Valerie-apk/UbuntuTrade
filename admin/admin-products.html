<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Admin | UbuntuTrade</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/sidebar-init.js"></script>
    <style>
        .page-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:24px; }
        .page-header h1 { font-size:22px;font-weight:700;margin:0; }
        .page-header p { color:#888;margin:4px 0 0;font-size:13px; }
        .btn-primary { background:#e04a2f;color:#fff;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600; }
        .btn-blue { background:#3b82f6;color:#fff;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px; }
        .btn-red { background:#ef4444;color:#fff;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px; }
        .controls { display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center; }
        .controls .search-bar { flex:1;min-width:200px; }
        .ctrl-select { padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff; }
        .form-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px; }
        .form-label { display:flex;flex-direction:column;gap:4px;font-size:13px;font-weight:600; }
        .form-input { padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;width:100%;box-sizing:border-box; }
        .form-full { grid-column:1/-1; }
        .modal-footer { display:flex;gap:8px;justify-content:flex-end;margin-top:20px; }
        .btn-cancel { background:#f5f5f5;color:#333;border:1px solid #ddd;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px; }
        .btn-save { background:#e04a2f;color:#fff;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600; }
        .action-btns { display:flex;gap:6px; }
        .card-header { display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #f0f0f0; }
        .card-header h3 { margin:0;font-size:15px; }
        .prod-thumb { width:40px;height:40px;border-radius:6px;object-fit:cover;background:#f0f0f0;flex-shrink:0; }
        .prod-cell { display:flex;align-items:center;gap:10px; }
    </style>
</head>
<body class="admin-page">
    <nav class="navbar">
        <div class="logo">Ubuntu <span class="color-logo">Trade</span></div>
        <div class="nav-buttons">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search products...">
            </div>
            <div class="admin-profile">
                <i class="fas fa-bell"></i>
                <div class="profile-avatar" id="adminInitial">A</div>
                <span id="adminName">Admin</span>
            </div>
        </div>
    </nav>

    <div class="admin-wrapper">
        <div id="sidebarContainer"></div>

        <div class="admin-content">
            <div class="page-header">
                <div>
                    <h1>Products</h1>
                    <p>Manage all marketplace listings</p>
                </div>
                <button class="btn-primary" onclick="openNewModal()">
                    <i class="fas fa-plus"></i> New Product
                </button>
            </div>

            <!-- Stats -->
            <div class="admin-stats">
                <div class="stat-box">
                    <div class="stat-icon total-products"><i class="fas fa-box"></i></div>
                    <div class="stat-info"><div class="stat-label">Total</div><div class="stat-value" id="sTotal">—</div></div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon total-users"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info"><div class="stat-label">Active</div><div class="stat-value" id="sActive">—</div></div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon total-orders"><i class="fas fa-handshake"></i></div>
                    <div class="stat-info"><div class="stat-label">Sold</div><div class="stat-value" id="sSold">—</div></div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon total-sales"><i class="fas fa-ban"></i></div>
                    <div class="stat-info"><div class="stat-label">Removed</div><div class="stat-value" id="sRemoved">—</div></div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="prodSearch" placeholder="Search by name or seller..." oninput="filterProducts()">
                </div>
                <select id="catFilter" class="ctrl-select" onchange="filterProducts()">
                    <option value="">All Categories</option>
                    <option>Electronics</option>
                    <option>Clothing</option>
                    <option>Shoes</option>
                    <option>Home &amp; Living</option>
                    <option>Accessories</option>
                    <option>Sports</option>
                    <option>Jewelry</option>
                </select>
                <select id="statusFilter" class="ctrl-select" onchange="filterProducts()">
                    <option value="">All Status</option>
                    <option value="Active">Active</option>
                    <option value="Sold">Sold</option>
                    <option value="Pending">Pending</option>
                    <option value="Removed">Removed</option>
                </select>
            </div>

            <!-- Table -->
            <div class="admin-card">
                <div class="card-header">
                    <h3>All Products</h3>
                    <span id="prodCount" style="color:#888;font-size:13px;"></span>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Product</th>
                            <th>Seller</th>
                            <th>Category</th>
                            <th>Condition</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Views</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="prodsBody">
                        <tr><td colspan="9" style="padding:24px;text-align:center;color:#888;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;">
        <div style="background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:32px;position:relative;margin:16px;">
            <button onclick="closeModal()" style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1;">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000';
        let allProducts = [];
        let allUsers = [];

        const admin = localStorage.getItem('username') || 'Admin';
        document.getElementById('adminName').textContent = admin;
        document.getElementById('adminInitial').textContent = admin.charAt(0).toUpperCase();

        async function loadData() {
            try {
                const [pRes, uRes] = await Promise.all([
                    fetch(`${API}/api/products?status=all`),
                    fetch(`${API}/api/users`)
                ]);
                allProducts = await pRes.json();
                allUsers = await uRes.json();
                renderStats(allProducts);
                renderTable(allProducts);
            } catch {
                document.getElementById('prodsBody').innerHTML =
                    '<tr><td colspan="9" style="padding:24px;text-align:center;color:red;">Failed to load products.</td></tr>';
            }
        }

        function renderStats(products) {
            document.getElementById('sTotal').textContent = products.length;
            document.getElementById('sActive').textContent = products.filter(p => p.status === 'Active').length;
            document.getElementById('sSold').textContent = products.filter(p => p.status === 'Sold').length;
            document.getElementById('sRemoved').textContent = products.filter(p => p.status === 'Removed').length;
        }

        function renderTable(products) {
            document.getElementById('prodCount').textContent = `${products.length} product${products.length !== 1 ? 's' : ''}`;
            const tbody = document.getElementById('prodsBody');
            if (!products.length) {
                tbody.innerHTML = '<tr><td colspan="9" style="padding:24px;text-align:center;color:#888;">No products found.</td></tr>';
                return;
            }
            tbody.innerHTML = products.map(p => {
                const imgSrc = p.imageUrl && p.imageUrl !== 'default-product.png' ? p.imageUrl : '';
                const seller = p.seller ? p.seller.username : '—';
                return `
                <tr>
                    <td>${p.id}</td>
                    <td>
                        <div class="prod-cell">
                            <img class="prod-thumb" src="${imgSrc}" alt="${p.name}" onerror="this.src=''">
                            <div>
                                <div style="font-weight:600;font-size:13px;">${p.name}</div>
                                <div style="font-size:11px;color:#888;">${p.location || ''}</div>
                            </div>
                        </div>
                    </td>
                    <td>${seller}</td>
                    <td>${p.category || '—'}</td>
                    <td>${p.condition || '—'}</td>
                    <td>R${Number(p.price).toLocaleString()}</td>
                    <td><span class="status-badge ${(p.status || '').toLowerCase()}">${p.status || '—'}</span></td>
                    <td>${p.views || 0}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-blue" onclick="openEditModal(${p.id})"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-red" onclick="deleteProduct(${p.id}, '${p.name.replace(/'/g, "\\'")}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function filterProducts() {
            const q = document.getElementById('prodSearch').value.toLowerCase();
            const cat = document.getElementById('catFilter').value;
            const status = document.getElementById('statusFilter').value;
            let list = allProducts;
            if (q) list = list.filter(p =>
                (p.name || '').toLowerCase().includes(q) ||
                (p.seller && p.seller.username || '').toLowerCase().includes(q) ||
                (p.category || '').toLowerCase().includes(q));
            if (cat) list = list.filter(p => p.category === cat);
            if (status) list = list.filter(p => p.status === status);
            renderTable(list);
        }

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        document.getElementById('modal').addEventListener('click', e => {
            if (e.target === document.getElementById('modal')) closeModal();
        });

        const CATEGORIES = ['Electronics','Clothing','Shoes','Home & Living','Accessories','Sports','Jewelry'];
        const CONDITIONS = ['Brand New','Like New','Good','Used'];
        const STATUSES = ['Active','Sold','Pending','Removed'];

        function selOpts(arr, selected) {
            return arr.map(v => `<option ${v === selected ? 'selected' : ''}>${v}</option>`).join('');
        }

        function prodFormHTML(title, p = {}, isNew = false) {
            const sellerOpts = allUsers.map(u =>
                `<option value="${u.id}" ${p.userId == u.id ? 'selected' : ''}>${u.username} (${u.role})</option>`
            ).join('');
            return `
                <h2 style="margin:0 0 20px;font-size:18px;font-weight:700;">${title}</h2>
                <form id="mForm">
                    <div class="form-grid">
                        <label class="form-label form-full">Product Name *
                            <input class="form-input" name="name" value="${p.name || ''}" required placeholder="e.g. Nike Air Force 1">
                        </label>
                        <label class="form-label">Category *
                            <select class="form-input" name="category">${selOpts(CATEGORIES, p.category)}</select>
                        </label>
                        <label class="form-label">Condition *
                            <select class="form-input" name="condition">${selOpts(CONDITIONS, p.condition)}</select>
                        </label>
                        <label class="form-label">Price (R) *
                            <input class="form-input" name="price" type="number" value="${p.price || ''}" required placeholder="650">
                        </label>
                        <label class="form-label">Status
                            <select class="form-input" name="status">${selOpts(STATUSES, p.status || 'Active')}</select>
                        </label>
                        <label class="form-label">Location
                            <input class="form-input" name="location" value="${p.location || ''}" placeholder="Johannesburg">
                        </label>
                        <label class="form-label">Seller *
                            <select class="form-input" name="userId">${sellerOpts}</select>
                        </label>
                        <label class="form-label form-full">Image URL
                            <input class="form-input" name="imageUrl" value="${p.imageUrl && p.imageUrl !== 'default-product.png' ? p.imageUrl : ''}" placeholder="https://...">
                        </label>
                        <label class="form-label form-full">Description
                            <textarea class="form-input" name="description" rows="3" placeholder="Describe the product...">${p.description || ''}</textarea>
                        </label>
                    </div>
                    <div id="formErr" style="color:red;font-size:13px;margin-top:8px;display:none;"></div>
                    <div class="modal-footer">
                        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="btn-save">${isNew ? 'Create Product' : 'Save Changes'}</button>
                    </div>
                </form>`;
        }

        function openNewModal() {
            document.getElementById('modalContent').innerHTML = prodFormHTML('New Product', {}, true);
            openModal();
            document.getElementById('mForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const body = Object.fromEntries(new FormData(this).entries());
                body.price = Number(body.price);
                await submitForm(`${API}/api/products/add`, 'POST', body, 'Create Product');
            });
        }

        function openEditModal(id) {
            const p = allProducts.find(x => x.id === id);
            if (!p) return;
            document.getElementById('modalContent').innerHTML = prodFormHTML(`Edit Product #${p.id}`, p, false);
            openModal();
            document.getElementById('mForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const body = Object.fromEntries(new FormData(this).entries());
                body.price = Number(body.price);
                await submitForm(`${API}/api/products/${id}`, 'PUT', body, 'Save Changes');
            });
        }

        async function submitForm(url, method, body, btnLabel) {
            const err = document.getElementById('formErr');
            const btn = document.querySelector('#mForm [type="submit"]');
            btn.disabled = true; btn.textContent = 'Saving...';
            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || data.message || 'Request failed');
                closeModal();
                loadData();
            } catch (ex) {
                err.textContent = ex.message; err.style.display = 'block';
                btn.disabled = false; btn.textContent = btnLabel;
            }
        }

        async function deleteProduct(id, name) {
            if (!confirm(`Remove product "${name}"?\nIt will be marked as Removed.`)) return;
            try {
                const res = await fetch(`${API}/api/products/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Delete failed');
                loadData();
            } catch (e) {
                alert('Failed: ' + e.message);
            }
        }

        loadData();
        loadSidebar('/admin/admin-sidebar.html');
    </script>
</body>
</html>
