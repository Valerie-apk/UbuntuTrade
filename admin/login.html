<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - UbuntuTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #0f1117;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .admin-login-wrap {
            width: 100%;
            max-width: 420px;
        }
        .admin-brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .admin-brand .logo-text {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .admin-brand .logo-text span { color: #e07b39; }
        .admin-brand .badge {
            display: inline-block;
            margin-top: 8px;
            padding: 3px 12px;
            background: #e07b39;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 20px;
        }
        .admin-card {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 16px;
            padding: 40px 36px;
        }
        .admin-card h2 {
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .admin-card p {
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .field {
            margin-bottom: 18px;
        }
        .field label {
            display: block;
            color: #aaa;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 7px;
        }
        .field-input {
            position: relative;
        }
        .field-input i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            font-size: 14px;
        }
        .field input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            background: #0f1117;
            border: 1.5px solid #2a2d3a;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            transition: border-color .2s;
            outline: none;
        }
        .field input::placeholder { color: #444; }
        .field input:focus { border-color: #e07b39; }
        .error-box {
            background: #2d1a1a;
            border: 1px solid #5a2a2a;
            border-radius: 8px;
            padding: 10px 14px;
            color: #f87171;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .error-box i { margin-right: 6px; }
        .submit-btn {
            width: 100%;
            padding: 13px;
            background: #e07b39;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background .2s, opacity .2s;
            margin-top: 4px;
        }
        .submit-btn:hover { background: #c96a2a; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #555;
        }
        .back-link a { color: #e07b39; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
        .lock-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: rgba(224,123,57,0.12);
            border-radius: 14px;
            margin-bottom: 20px;
        }
        .lock-icon i { font-size: 22px; color: #e07b39; }
    </style>
</head>
<body>

<div class="admin-login-wrap">
    <div class="admin-brand">
        <div class="logo-text">Ubuntu<span>Trade</span></div>
        <span class="badge">Admin Portal</span>
    </div>

    <div class="admin-card">
        <div class="lock-icon"><i class="fas fa-shield-halved"></i></div>
        <h2>Admin Sign In</h2>
        <p>This area is restricted to authorised administrators only.</p>

        <form id="adminLoginForm">
            <div class="field">
                <label for="email">Email address</label>
                <div class="field-input">
                    <i class="fas fa-envelope"></i>
                    <input id="email" type="email" placeholder="admin@ubuntutrade.co.za" required autocomplete="email">
                </div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="field-input">
                    <i class="fas fa-lock"></i>
                    <input id="password" type="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
            </div>

            <div class="error-box" id="loginError">
                <i class="fas fa-triangle-exclamation"></i>
                <span id="errorMsg">Invalid credentials.</span>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fas fa-sign-in-alt"></i> Sign In to Admin Panel
            </button>
        </form>
    </div>

    <div class="back-link">
        <a href="/index/index.html"><i class="fas fa-arrow-left"></i> Back to main site</a>
    </div>
</div>

<script>
    // Already logged in as admin? Redirect immediately
    (function () {
        try {
            var u = JSON.parse(localStorage.getItem('utUser') || 'null');
            if (u && u.role === 'Admin') window.location.replace('/admin/admin.html');
        } catch (e) {}
    })();

    document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        var errBox = document.getElementById('loginError');
        var errMsg = document.getElementById('errorMsg');
        var btn    = document.getElementById('submitBtn');
        errBox.style.display = 'none';

        var email    = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

        try {
            var res  = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            var data = await res.json();

            if (!res.ok) {
                errMsg.textContent = data.message || 'Login failed.';
                errBox.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In to Admin Panel';
                return;
            }

            if (data.user.role !== 'Admin') {
                errMsg.textContent = 'Access denied. This portal is for administrators only.';
                errBox.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In to Admin Panel';
                return;
            }

            localStorage.setItem('utUser', JSON.stringify(data.user));
            window.location.href = '/admin/admin.html';
        } catch (err) {
            errMsg.textContent = 'Network error. Please try again.';
            errBox.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In to Admin Panel';
        }
    });
</script>

</body>
</html>
