<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Admin | UbuntuTrade</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/sidebar-init.js"></script>
    <style>
        .page-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:24px; }
        .page-header h1 { font-size:22px;font-weight:700;margin:0; }
        .page-header p { color:#888;margin:4px 0 0;font-size:13px; }
        .btn-primary { background:#e04a2f;color:#fff;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600; }
        .btn-blue { background:#3b82f6;color:#fff;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px; }
        .btn-red { background:#ef4444;color:#fff;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px; }
        .controls { display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center; }
        .controls .search-bar { flex:1;min-width:200px; }
        .ctrl-select { padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff; }
        .form-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px; }
        .form-label { display:flex;flex-direction:column;gap:4px;font-size:13px;font-weight:600; }
        .form-input { padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;width:100%;box-sizing:border-box; }
        .modal-footer { display:flex;gap:8px;justify-content:flex-end;margin-top:20px; }
        .btn-cancel { background:#f5f5f5;color:#333;border:1px solid #ddd;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px; }
        .btn-save { background:#e04a2f;color:#fff;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600; }
        .action-btns { display:flex;gap:6px; }
        .card-header { display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #f0f0f0; }
        .card-header h3 { margin:0;font-size:15px; }
    </style>
</head>
<body class="admin-page">
    <nav class="navbar">
        <div class="logo">Ubuntu <span class="color-logo">Trade</span></div>
        <div class="nav-buttons">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="globalSearch" placeholder="Search users...">
            </div>
            <div class="admin-profile">
                <i class="fas fa-bell"></i>
                <div class="profile-avatar" id="adminInitial">A</div>
                <span id="adminName">Admin</span>
            </div>
        </div>
    </nav>

    <div class="admin-wrapper">
        <div id="sidebarContainer"></div>

        <div class="admin-content">
            <div class="page-header">
                <div>
                    <h1>Users</h1>
                    <p>Manage all registered users</p>
                </div>
                <button class="btn-primary" onclick="openNewModal()">
                    <i class="fas fa-plus"></i> New User
                </button>
            </div>

            <!-- Stats -->
            <div class="admin-stats">
                <div class="stat-box">
                    <div class="stat-icon total-users"><i class="fas fa-users"></i></div>
                    <div class="stat-info"><div class="stat-label">Total Users</div><div class="stat-value" id="sTotal">—</div></div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon total-orders"><i class="fas fa-shield-alt"></i></div>
                    <div class="stat-info"><div class="stat-label">Admins</div><div class="stat-value" id="sAdmins">—</div></div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon total-products"><i class="fas fa-store"></i></div>
                    <div class="stat-info"><div class="stat-label">Sellers</div><div class="stat-value" id="sSellers">—</div></div>
                </div>
                <div class="stat-box">
                    <div class="stat-icon total-sales"><i class="fas fa-user"></i></div>
                    <div class="stat-info"><div class="stat-label">Buyers</div><div class="stat-value" id="sBuyers">—</div></div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="userSearch" placeholder="Search by name or email..." oninput="filterUsers()">
                </div>
                <select id="roleFilter" class="ctrl-select" onchange="filterUsers()">
                    <option value="">All Roles</option>
                    <option value="Admin">Admin</option>
                    <option value="Seller">Seller</option>
                    <option value="Buyer">Buyer</option>
                </select>
                <select id="verifiedFilter" class="ctrl-select" onchange="filterUsers()">
                    <option value="">All</option>
                    <option value="true">Verified</option>
                    <option value="false">Unverified</option>
                </select>
            </div>

            <!-- Table -->
            <div class="admin-card">
                <div class="card-header">
                    <h3>All Users</h3>
                    <span id="userCount" style="color:#888;font-size:13px;"></span>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>User</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Location</th>
                            <th>Joined</th>
                            <th>Verified</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody">
                        <tr><td colspan="8" style="padding:24px;text-align:center;color:#888;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;">
        <div style="background:#fff;border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:32px;position:relative;margin:16px;">
            <button onclick="closeModal()" style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1;">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000';
        let allUsers = [];

        const admin = localStorage.getItem('username') || 'Admin';
        document.getElementById('adminName').textContent = admin;
        document.getElementById('adminInitial').textContent = admin.charAt(0).toUpperCase();

        async function loadUsers() {
            try {
                const res = await fetch(`${API}/api/users`);
                allUsers = await res.json();
                renderStats(allUsers);
                renderTable(allUsers);
            } catch {
                document.getElementById('usersBody').innerHTML =
                    '<tr><td colspan="8" style="padding:24px;text-align:center;color:red;">Failed to load users.</td></tr>';
            }
        }

        function renderStats(users) {
            document.getElementById('sTotal').textContent = users.length;
            document.getElementById('sAdmins').textContent = users.filter(u => u.role === 'Admin').length;
            document.getElementById('sSellers').textContent = users.filter(u => u.role === 'Seller').length;
            document.getElementById('sBuyers').textContent = users.filter(u => u.role === 'Buyer' || !u.role).length;
        }

        function renderTable(users) {
            document.getElementById('userCount').textContent = `${users.length} user${users.length !== 1 ? 's' : ''}`;
            const tbody = document.getElementById('usersBody');
            if (!users.length) {
                tbody.innerHTML = '<tr><td colspan="8" style="padding:24px;text-align:center;color:#888;">No users found.</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>
                        <div class="user-cell">
                            ${u.avatarUrl
                                ? `<img src="${u.avatarUrl}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;" onerror="this.style.display='none'">`
                                : `<div class="avatar">${(u.username || 'U').charAt(0).toUpperCase()}</div>`}
                            <div>
                                <div style="font-weight:600;font-size:13px;">${u.username || '—'}</div>
                                <div style="font-size:11px;color:#888;">${u.fullName || ''}</div>
                            </div>
                        </div>
                    </td>
                    <td>${u.email}</td>
                    <td><span class="role-badge ${(u.role || 'buyer').toLowerCase()}">${u.role || 'Buyer'}</span></td>
                    <td>${u.location || '—'}</td>
                    <td>${new Date(u.createdAt).toLocaleDateString('en-ZA')}</td>
                    <td>${u.isVerified
                        ? '<span style="color:#22c55e;font-size:13px;"><i class="fas fa-check-circle"></i> Yes</span>'
                        : '<span style="color:#f59e0b;font-size:13px;"><i class="fas fa-clock"></i> No</span>'}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-blue" onclick="openEditModal(${u.id})"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-red" onclick="deleteUser(${u.id}, '${(u.username || '').replace(/'/g, "\\'")}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function filterUsers() {
            const q = document.getElementById('userSearch').value.toLowerCase();
            const role = document.getElementById('roleFilter').value;
            const verified = document.getElementById('verifiedFilter').value;
            let list = allUsers;
            if (q) list = list.filter(u =>
                (u.username || '').toLowerCase().includes(q) ||
                (u.email || '').toLowerCase().includes(q) ||
                (u.fullName || '').toLowerCase().includes(q));
            if (role) list = list.filter(u => u.role === role);
            if (verified !== '') list = list.filter(u => String(u.isVerified) === verified);
            renderTable(list);
        }

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        document.getElementById('modal').addEventListener('click', e => {
            if (e.target === document.getElementById('modal')) closeModal();
        });

        function formHTML(title, values = {}) {
            return `
                <h2 style="margin:0 0 20px;font-size:18px;font-weight:700;">${title}</h2>
                <div class="form-grid">
                    <label class="form-label">Username ${values.isNew ? '*' : ''}
                        <input class="form-input" name="username" value="${values.username || ''}" ${values.isNew ? 'required' : ''} placeholder="johndoe">
                    </label>
                    <label class="form-label">Full Name
                        <input class="form-input" name="fullName" value="${values.fullName || ''}" placeholder="John Doe">
                    </label>
                    <label class="form-label">Email ${values.isNew ? '*' : ''}
                        <input class="form-input" name="email" type="email" value="${values.email || ''}" ${values.isNew ? 'required' : ''} placeholder="john@example.com">
                    </label>
                    ${values.isNew ? `<label class="form-label">Password *
                        <input class="form-input" name="password" type="password" required placeholder="••••••••">
                    </label>` : ''}
                    <label class="form-label">Phone
                        <input class="form-input" name="phone" value="${values.phone || ''}" placeholder="+27 ...">
                    </label>
                    <label class="form-label">Location
                        <input class="form-input" name="location" value="${values.location || ''}" placeholder="Johannesburg">
                    </label>
                    <label class="form-label">Role
                        <select class="form-input" name="role">
                            <option ${(values.role||'Buyer')==='Buyer'?'selected':''}>Buyer</option>
                            <option ${values.role==='Seller'?'selected':''}>Seller</option>
                            <option ${values.role==='Admin'?'selected':''}>Admin</option>
                        </select>
                    </label>
                    ${!values.isNew ? `<label class="form-label">Verified
                        <select class="form-input" name="isVerified">
                            <option value="true" ${values.isVerified?'selected':''}>Yes</option>
                            <option value="false" ${!values.isVerified?'selected':''}>No</option>
                        </select>
                    </label>` : ''}
                </div>
                <div id="formErr" style="color:red;font-size:13px;margin-top:8px;display:none;"></div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-save">${values.isNew ? 'Create User' : 'Save Changes'}</button>
                </div>`;
        }

        function openNewModal() {
            document.getElementById('modalContent').innerHTML = `<form id="mForm">${formHTML('New User', { isNew: true })}</form>`;
            openModal();
            document.getElementById('mForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const body = Object.fromEntries(new FormData(this).entries());
                await submitForm(`${API}/api/users`, 'POST', body, 'Create User');
            });
        }

        function openEditModal(id) {
            const u = allUsers.find(x => x.id === id);
            if (!u) return;
            document.getElementById('modalContent').innerHTML = `<form id="mForm">${formHTML(`Edit User #${u.id}`, u)}</form>`;
            openModal();
            document.getElementById('mForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const body = Object.fromEntries(new FormData(this).entries());
                if ('isVerified' in body) body.isVerified = body.isVerified === 'true';
                await submitForm(`${API}/api/users/${id}`, 'PUT', body, 'Save Changes');
            });
        }

        async function submitForm(url, method, body, btnLabel) {
            const err = document.getElementById('formErr');
            const btn = document.querySelector('#mForm [type="submit"]');
            btn.disabled = true; btn.textContent = 'Saving...';
            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || data.message || 'Request failed');
                closeModal();
                loadUsers();
            } catch (ex) {
                err.textContent = ex.message; err.style.display = 'block';
                btn.disabled = false; btn.textContent = btnLabel;
            }
        }

        async function deleteUser(id, name) {
            if (!confirm(`Delete user "${name}"?\nThis cannot be undone.`)) return;
            try {
                const res = await fetch(`${API}/api/users/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Delete failed');
                loadUsers();
            } catch (e) {
                alert('Failed to delete: ' + e.message);
            }
        }

        loadUsers();
        loadSidebar('/admin/admin-sidebar.html');
    </script>
</body>
</html>
